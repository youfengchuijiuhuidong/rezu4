<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#4f46e5"><title>ECR-R 亲密关系经历量表</title><style>:root{--p:#4f46e5;--bg:#f5f7fb;--t:#172033;--m:#667085;--l:#e4e7ec}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:linear-gradient(180deg,#eef2ff,var(--bg) 30%);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;color:var(--t);padding-bottom:88px}.wrap{max-width:820px;margin:auto;padding:16px}.hero{background:linear-gradient(135deg,#312e81,#4f46e5,#7c3aed);color:#fff;padding:25px 20px;border-radius:24px;box-shadow:0 16px 40px #4f46e544}.hero h1{margin:0 0 10px;font-size:30px}.hero p{margin:0;line-height:1.7;opacity:.92}.tags{display:flex;gap:7px;flex-wrap:wrap;margin-top:14px}.tag{background:#ffffff22;padding:6px 10px;border-radius:999px;font-size:13px}.card,.q{background:#fff;border:1px solid var(--l);border-radius:18px;box-shadow:0 8px 28px #1018280d}.card{padding:17px;margin:14px 0}.guide{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center;font-size:11px;color:var(--m)}.guide b{display:block;color:var(--t);font-size:14px}.progress{position:sticky;top:0;z-index:10;background:#f5f7fbe8;backdrop-filter:blur(12px);padding:10px 0}.prow{display:flex;justify-content:space-between;font-size:13px}.track{height:8px;background:#e8eaf1;border-radius:99px;overflow:hidden;margin-top:7px}.bar{height:100%;width:0;background:linear-gradient(90deg,#4f46e5,#8b5cf6)}h2{font-size:21px;margin:25px 3px 5px}.sub{font-size:13px;color:var(--m);margin:0 3px 10px}.q{padding:15px;margin:11px 0}.qt{display:flex;gap:10px;line-height:1.62}.num{flex:0 0 31px;height:31px;border-radius:10px;background:#eef2ff;color:var(--p);display:grid;place-items:center;font-weight:800}.opts{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:13px}.opts input{position:absolute;opacity:0}.opts span{display:grid;place-items:center;height:41px;border:1px solid var(--l);border-radius:11px;font-weight:750;color:#475467}.opts input:checked+span{background:var(--p);border-color:var(--p);color:#fff;box-shadow:0 6px 14px #4f46e544}.anchors{display:flex;justify-content:space-between;font-size:11px;color:var(--m);margin-top:6px}.done{border-color:#c7d2fe;box-shadow:0 0 0 3px #eef2ff}.bottom{position:fixed;left:0;right:0;bottom:0;background:#ffffffeb;backdrop-filter:blur(14px);border-top:1px solid var(--l);padding:10px 14px calc(10px + env(safe-area-inset-bottom));z-index:20}.bi{max-width:820px;margin:auto;display:grid;grid-template-columns:1fr auto;gap:9px}button{border:0;border-radius:13px;padding:13px 16px;font-weight:800;font-size:15px}.primary{background:var(--p);color:#fff}.secondary{background:#f2f4f7;color:#344054}.danger{background:#fff1f0;color:#d92d20}.notice{display:none;background:#fff4ed;color:#b54708;padding:12px;border-radius:12px;margin:12px 0;line-height:1.5}.result{display:none}.scores{display:grid;grid-template-columns:1fr 1fr;gap:11px}.score{background:#f8f9ff;border:1px solid #e0e7ff;border-radius:16px;padding:16px}.score small{color:var(--m)}.big{font-size:36px;font-weight:850;color:var(--p);margin:6px 0}.badge{display:inline-block;background:#ecfdf3;color:#067647;padding:7px 11px;border-radius:99px;font-weight:800}.copy{line-height:1.75;color:#344054}.tools{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}.tiny{font-size:12px;color:var(--m);line-height:1.6}@media(max-width:430px){.opts{gap:4px}.opts span{height:38px}.scores{grid-template-columns:1fr}.guide{font-size:9px}}@media print{.hero,.progress,#qs,.bottom,.tools,.notice{display:none!important}.result{display:block!important}}</style></head><body><main class="wrap"><section class="hero"><h1>ECR-R 亲密关系经历量表</h1><p>请根据你在恋爱关系中的通常感受，为每道题选择 1—7 分。选择最接近真实体验的一项。</p><div class="tags"><span class="tag">36 道题</span><span class="tag">自动保存</span><span class="tag">本地计分</span><span class="tag">数据不上传</span></div></section><section class="card"><div class="guide"><div><b>1</b>非常不同意</div><div><b>2</b>不同意</div><div><b>3</b>有点不同意</div><div><b>4</b>不确定</div><div><b>5</b>有点同意</div><div><b>6</b>同意</div><div><b>7</b>非常同意</div></div><p class="tiny">结果仅用于自我理解，不等同于心理诊断，也可能受到当前关系质量和近期冲突影响。</p></section><div class="progress"><div class="prow"><span id="pt">已完成 0 / 36</span><span>自动保存在本机</span></div><div class="track"><div class="bar" id="pb"></div></div></div><section id="qs"></section><div class="notice" id="notice"></div><section class="card result" id="result"><div class="badge" id="badge">结果</div><h2>你的依恋维度结果</h2><p class="copy" id="sum"></p><div class="scores"><div class="score"><small>依恋焦虑均分</small><div class="big" id="as">—</div></div><div class="score"><small>依恋回避均分</small><div class="big" id="vs">—</div></div></div><div class="copy" id="detail"></div><p class="tiny">计分范围为 1—7 分。第 9、11、20、22、26、27、28、29、30、31、33、34、35、36 题反向计分。页面以 4 分作为便于理解的参考分界，不是临床诊断线。</p><div class="tools"><button class="primary" onclick="shareR()">分享结果</button><button class="secondary" onclick="downloadR()">下载 TXT</button><button class="secondary" onclick="print()">保存 PDF</button><button class="danger" onclick="resetR()">清空重测</button></div></section></main><div class="bottom"><div class="bi"><button class="primary" onclick="score()">查看结果</button><button class="secondary" onclick="scrollTo({top:0,behavior:'smooth'})">↑</button></div></div><script>const T=["我害怕自己会失去伴侣的爱。","我经常担心伴侣不愿意继续和我在一起。","我经常担心伴侣并不真正爱我。","我担心伴侣对我的在意程度，不如我对伴侣的在意程度。","我经常希望伴侣对我的感情，能够像我对伴侣的感情一样强烈。","我经常为自己的恋爱关系担忧。","当伴侣不在我身边、我看不到对方时，我会担心对方可能对别人产生兴趣。","当我向伴侣表达自己的感情时，我会害怕对方对我的感情并不相同。","我很少担心伴侣会离开我。","我的伴侣会让我怀疑自己。","我通常不会担心自己被抛弃。","我觉得伴侣通常不愿意像我所希望的那样与我亲近。","有时，伴侣会无缘无故地改变对我的感情。","我想与伴侣非常亲密的愿望，有时会把对方吓跑。","我害怕伴侣真正了解我之后，会不喜欢真实的我。","当我无法从伴侣那里得到自己需要的关爱和支持时，我会感到生气。","我担心自己不如其他人好。","我的伴侣似乎只有在我生气时，才会真正注意到我。","我不愿意让伴侣看到自己内心深处的真实感受。","我能够自在地与伴侣分享自己的私人想法和感受。","我发现自己很难允许自己依赖伴侣。","我很享受并且适应与伴侣保持亲密。","我不太愿意向伴侣敞开心扉。","我不希望自己与伴侣过于亲密。","当伴侣想与我非常亲密时，我会感到不舒服。","我觉得自己比较容易与伴侣建立亲密关系。","对我来说，与伴侣亲近并不困难。","我通常会与伴侣讨论自己的问题和担忧。","当我有需要时，向伴侣寻求帮助和安慰会让我感觉好一些。","我几乎什么事情都会告诉伴侣。","我会与伴侣一起讨论并解决问题。","当伴侣与我过于亲近时，我会感到紧张。","我能够自在地依赖伴侣。","我觉得依赖伴侣是一件容易的事情。","我很容易自然地向伴侣表达爱意。","我的伴侣真正理解我以及我的需要。"],R=new Set([9,11,20,22,26,27,28,29,30,31,33,34,35,36]),A=Array(36).fill(null),K='ecrr_web_v1';let text='';function render(){let h='';T.forEach((t,i)=>{if(i==0)h+='<h2>一、依恋焦虑维度</h2><p class="sub">关注失去关系、被抛弃或得不到足够回应的担忧。</p>';if(i==18)h+='<h2>二、依恋回避维度</h2><p class="sub">关注对亲密、依赖和情感开放的不适程度。</p>';let n=i+1;h+=`<article class="q" id="q${n}"><div class="qt"><span class="num">${n}</span><span>${t}</span></div><div class="opts">${[1,2,3,4,5,6,7].map(v=>`<label><input type="radio" name="q${n}" value="${v}"><span>${v}</span></label>`).join('')}</div><div class="anchors"><span>非常不同意</span><span>非常同意</span></div></article>`});qs.innerHTML=h;qs.onchange=e=>{if(!e.target.matches('input'))return;let i=+e.target.name.slice(1)-1;A[i]=+e.target.value;document.getElementById('q'+(i+1)).classList.add('done');save();prog()}}function save(){localStorage.setItem(K,JSON.stringify(A))}function load(){try{let x=JSON.parse(localStorage.getItem(K));if(Array.isArray(x))x.forEach((v,i)=>{if(v>=1&&v<=7){A[i]=v;let r=document.querySelector(`input[name=q${i+1}][value='${v}']`);if(r)r.checked=true;document.getElementById('q'+(i+1)).classList.add('done')}})}catch(e){}}function prog(){let n=A.filter(x=>x).length;pt.textContent=`已完成 ${n} / 36`;pb.style.width=n/36*100+'%'}function val(i){return R.has(i+1)?8-A[i]:A[i]}function avg(s,e){let z=0;for(let i=s;i<e;i++)z+=val(i);return z/(e-s)}function cls(a,v){if(a<4&&v<4)return['相对安全型','你的依恋焦虑和依恋回避都相对较低。','你通常较能信任关系的稳定性，也更能接受亲密、表达需要和依赖伴侣。'];if(a>=4&&v<4)return['焦虑倾向型','你的依恋焦虑相对较高，而依恋回避相对较低。','你很重视亲密与关系确认，但更容易担心被忽视、被抛弃或双方投入不对等。'];if(a<4&&v>=4)return['回避倾向型','你的依恋焦虑相对较低，而依恋回避相对较高。','你可能不太担心被抛弃，但对依赖、暴露脆弱或过度亲密更敏感。'];return['焦虑—回避并存型','你的依恋焦虑和依恋回避都相对较高。','你可能既强烈希望被理解和靠近，又担心亲密会带来受伤、失控或失望。']}function score(){let m=A.map((x,i)=>x?null:i+1).filter(Boolean);if(m.length){notice.style.display='block';notice.textContent=`还有 ${m.length} 题未完成：第 ${m.slice(0,12).join('、')}${m.length>12?'……':''}题。`;document.getElementById('q'+m[0]).scrollIntoView({behavior:'smooth',block:'center'});return}notice.style.display='none';let a=avg(0,18),v=avg(18,36),c=cls(a,v);as.textContent=a.toFixed(2);vs.textContent=v.toFixed(2);badge.textContent=c[0];sum.textContent=c[1];detail.innerHTML=`<p>${c[2]}</p><p><b>怎样理解：</b>两个维度都是连续谱。更重要的是观察：什么情境会触发不安或退缩，伴侣如何回应，以及双方能否在冲突后完成修复。</p>`;text=`ECR-R 亲密关系经历量表结果\n依恋焦虑均分：${a.toFixed(2)} / 7\n依恋回避均分：${v.toFixed(2)} / 7\n结果类型：${c[0]}\n\n${c[1]}\n${c[2]}\n\n结果用于自我理解，不等同于心理诊断。`;result.style.display='block';result.scrollIntoView({behavior:'smooth'})}async function shareR(){if(!text)score();if(!text)return;if(navigator.share)try{return await navigator.share({title:'ECR-R 测试结果',text})}catch(e){}try{await navigator.clipboard.writeText(text);alert('结果已复制')}catch(e){downloadR()}}function downloadR(){if(!text)score();if(!text)return;let u=URL.createObjectURL(new Blob([text],{type:'text/plain;charset=utf-8'})),a=document.createElement('a');a.href=u;a.download='ECR-R量表结果.txt';a.click();URL.revokeObjectURL(u)}function resetR(){if(!confirm('确定清空全部答案吗？'))return;localStorage.removeItem(K);location.reload()}render();load();prog();</script></body></html>
