<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#4f46e5">
  <title>ECR-R 亲密关系经历量表</title>
  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f5f7fb}
    iframe{display:block;width:100%;height:100%;border:0;background:#f5f7fb}
    #fallback{display:none;position:fixed;right:14px;bottom:94px;z-index:999;border:0;border-radius:14px;padding:13px 16px;background:#4f46e5;color:#fff;font:700 14px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif;box-shadow:0 8px 22px rgba(79,70,229,.28)}
  </style>
</head>
<body>
  <iframe id="app" title="ECR-R 亲密关系经历量表" src="https://raw.githack.com/youfengchuijiuhuidong/rezu4/ff92f5b0b1875cad3ab6905e80918d689416b9f2/ecr-r/index.html"></iframe>
  <button id="fallback" type="button">导出完整答卷</button>
  <script>
    const frame = document.getElementById('app');
    const fallback = document.getElementById('fallback');
    const reverseItems = new Set([9,11,20,22,26,27,28,29,30,31,33,34,35,36]);
    const answerLabels = {
      1:'非常不同意',2:'不同意',3:'有点不同意',4:'不确定',
      5:'有点同意',6:'同意',7:'非常同意'
    };

    function getFrame() {
      try {
        return { win: frame.contentWindow, doc: frame.contentDocument };
      } catch (error) {
        return null;
      }
    }

    function exportAllAnswers() {
      const target = getFrame();
      if (!target || !target.doc) {
        alert('页面尚未加载完成，请稍后再试。');
        return;
      }

      const { win, doc } = target;
      const questions = [...doc.querySelectorAll('.q')];
      const rows = questions.map((question, index) => {
        const number = index + 1;
        const text = question.querySelector('.qt span:last-child')?.textContent.trim() || '';
        const selected = question.querySelector('input[type="radio"]:checked');
        const raw = selected ? Number(selected.value) : null;
        return { number, text, raw };
      });

      const missing = rows.filter(row => row.raw === null).map(row => row.number);
      if (missing.length) {
        if (typeof win.score === 'function') win.score();
        alert(`还有 ${missing.length} 题未作答，完成全部题目后才能导出完整答卷。`);
        return;
      }

      if (typeof win.score === 'function') win.score();
      const anxiety = doc.getElementById('as')?.textContent.trim() || '—';
      const avoidance = doc.getElementById('vs')?.textContent.trim() || '—';
      const type = doc.getElementById('badge')?.textContent.trim() || '—';
      const lines = [
        'ECR-R 亲密关系经历量表——完整答卷',
        `导出时间：${new Date().toLocaleString('zh-CN')}`,
        '',
        '【结果汇总】',
        `依恋焦虑均分：${anxiety} / 7`,
        `依恋回避均分：${avoidance} / 7`,
        `结果类型：${type}`,
        '',
        '【逐题作答】'
      ];

      rows.forEach(row => {
        if (row.number === 1) lines.push('', '一、依恋焦虑维度');
        if (row.number === 19) lines.push('', '二、依恋回避维度');
        const scored = reverseItems.has(row.number) ? 8 - row.raw : row.raw;
        lines.push(`${row.number}. ${row.text}`);
        lines.push(`   回答：${row.raw} 分（${answerLabels[row.raw]}）`);
        if (reverseItems.has(row.number)) {
          lines.push(`   计分：${scored} 分（反向计分，8 − ${row.raw}）`);
        } else {
          lines.push(`   计分：${scored} 分`);
        }
      });

      lines.push(
        '',
        '【说明】',
        '第 9、11、20、22、26、27、28、29、30、31、33、34、35、36 题采用反向计分。',
        '结果仅用于自我理解，不等同于心理诊断。'
      );

      const blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = 'ECR-R完整答卷.txt';
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function installExportOverride() {
      const target = getFrame();
      if (!target || !target.doc) {
        fallback.style.display = 'block';
        return;
      }

      const { win, doc } = target;
      win.downloadR = exportAllAnswers;
      const buttons = [...doc.querySelectorAll('button')];
      const downloadButton = buttons.find(button => button.textContent.includes('下载 TXT'));
      if (downloadButton) {
        downloadButton.textContent = '导出完整答卷';
        downloadButton.setAttribute('aria-label', '导出所有题目及回答');
      } else {
        fallback.style.display = 'block';
      }
    }

    frame.addEventListener('load', installExportOverride);
    fallback.addEventListener('click', exportAllAnswers);
  </script>
</body>
</html>
